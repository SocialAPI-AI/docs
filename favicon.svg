<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" fill="none">
  <!-- Favicon — SocialAPI.ai (v8 mark, optimised for small sizes) -->

  <!-- White background so it reads on any browser tab colour -->
  <rect width="44" height="44" rx="10" fill="#ffffff"/>

  <!-- Green glow behind center -->
  <circle cx="22" cy="22" r="9" fill="#22c55e" fill-opacity="0.12"/>

  <!-- Hexagon outline -->
  <polygon points="22,7 35,14.5 35,29.5 22,37 9,29.5 9,14.5"
           stroke="#0a0a0a" stroke-width="1" stroke-opacity="0.18" fill="none" stroke-linejoin="round"/>

  <!-- Spokes — slightly bolder than logo-mark for small-size clarity -->
  <line x1="22"  y1="7"    x2="22" y2="22" stroke="#404040" stroke-width="2" stroke-opacity="0.8"/>
  <line x1="35"  y1="14.5" x2="22" y2="22" stroke="#404040" stroke-width="2" stroke-opacity="0.8"/>
  <line x1="35"  y1="29.5" x2="22" y2="22" stroke="#404040" stroke-width="2" stroke-opacity="0.8"/>
  <line x1="22"  y1="37"   x2="22" y2="22" stroke="#404040" stroke-width="2" stroke-opacity="0.8"/>
  <line x1="9"   y1="29.5" x2="22" y2="22" stroke="#404040" stroke-width="2" stroke-opacity="0.8"/>
  <line x1="9"   y1="14.5" x2="22" y2="22" stroke="#404040" stroke-width="2" stroke-opacity="0.8"/>

  <!-- Platform nodes -->
  <circle cx="22"  cy="7"    r="3" fill="#2a2a2a"/>
  <circle cx="35"  cy="14.5" r="3" fill="#2a2a2a"/>
  <circle cx="35"  cy="29.5" r="3" fill="#2a2a2a"/>
  <circle cx="22"  cy="37"   r="3" fill="#2a2a2a"/>
  <circle cx="9"   cy="29.5" r="3" fill="#2a2a2a"/>
  <circle cx="9"   cy="14.5" r="3" fill="#2a2a2a"/>

  <!-- Central API endpoint — the green anchor -->
  <circle cx="22" cy="22" r="5.5" fill="#22c55e"/>
</svg>
